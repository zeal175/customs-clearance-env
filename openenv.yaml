spec_version: 1
name: customs-clearance-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  An OpenEnv environment simulating Custom House Agent (CHA) operations
  in Indian sea freight. Agents must classify goods, validate documents,
  and make clearance decisions across 3 difficulty levels.
author: Rakesh Karthikeyan
tags:
  - real-world
  - trade-compliance
  - document-processing
  - customs
  - openenv
tasks:
  - id: task1
    name: HS Code Classification
    difficulty: easy
    evaluator: true
  - id: task2
    name: Document Validation
    difficulty: medium
    evaluator: true
  - id: task3
    name: Full Clearance Decision
    difficulty: hard
    evaluator: true
